services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: spending_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/spending_tracker
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      API_SECRET_TOKEN: ${API_SECRET_TOKEN}
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://api.spending.dylanvdk.dev
        VITE_API_SECRET_TOKEN: ${API_SECRET_TOKEN}
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  postgres_data: